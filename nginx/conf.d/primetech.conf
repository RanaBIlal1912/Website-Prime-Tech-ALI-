# Nginx reverse proxy for the Prime Tech backend.
# SSL is enabled by mounting certs into ./nginx/certs and uncommenting the 443 block.

upstream primetech_backend {
    server backend:8000;
}

# --- HTTP ---
server {
    listen 80;
    server_name _;

    client_max_body_size 50M;   # matches media upload cap

    # Security headers (defense-in-depth; app also sets these).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /static/ {
        alias /var/www/static/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://primetech_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

