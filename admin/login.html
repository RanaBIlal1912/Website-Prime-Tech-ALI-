<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | SecureNet</title>
<link rel="stylesheet" href="../assets/css/style.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .login-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .login-box h2 { margin-bottom: 6px; }
  .login-box p { color: var(--text-muted); margin-bottom: 25px; font-size: .9rem; }
  .error-msg { color: #ff5e5e; font-size: .85rem; margin-top: 10px; display:none; }
</style>
</head>
<body>

<div class="login-box">
  <h2>🔐 Admin Login</h2>
  <p>SecureNet Control Panel</p>
  <form id="loginForm">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
    <p class="error-msg" id="errorMsg">Invalid username or password!</p>
  </form>
  <p style="margin-top:20px; font-size:.8rem; color:var(--text-muted);">
    Default: admin / admin123
  </p>
  <p style="margin-top:10px;"><a href="../index.html" style="color:var(--primary); font-size:.85rem;">← Back to Website</a></p>
</div>

<script src="../assets/js/data.js"></script>
<script>
  // default admin credentials stored in localStorage
  if (!localStorage.getItem('itsec_admin_creds')) {
    localStorage.setItem('itsec_admin_creds', JSON.stringify({ username: 'admin', password: 'admin123' }));
  }

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const creds = JSON.parse(localStorage.getItem('itsec_admin_creds'));
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    if (u === creds.username && p === creds.password) {
      sessionStorage.setItem('itsec_admin_logged_in', 'true');
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('errorMsg').style.display = 'block';
    }
  });
</script>
</body>
</html>
